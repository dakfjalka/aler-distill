seed: 42
deterministic: false

output_dir: checkpoints
resume_from_checkpoint: null

max_steps: 1000
num_train_epochs: 2
logging_steps: 10
save_steps: 500

per_device_train_batch_size: 4
gradient_accumulation_steps: 8

learning_rate: 4e-5
weight_decay: 0.0
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_grad_norm: 1.0

sft:
  packing: false
  gradient_checkpointing: true
  max_seq_length: ${data.train.max_length}
  dataset_num_proc: 4
  remove_unused_columns: true

bf16: true
fp16: false
tf32: true

gen:
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.95
  do_sample: true
  stop: null

system_prompt: null

fsdp:
  enabled: false
  fsdp: "full_shard auto_wrap"
  config: {}

distributed:
  backend: nccl
  timeout_minutes: 20

extra_trainer_kwargs: {}
